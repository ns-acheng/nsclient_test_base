[pytest]
pythonpath = .
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short -ra -p no:cacheprovider

markers =
    # Platform
    windows: Windows-only test
    macos: macOS-only test
    linux: Linux-only test
    # Test type
    unit: Fully mocked unit test (no real I/O)
    integration: Requires real NSClient / services
    # Priority (from test plans)
    priority_high: P0 — must-pass
    p0: Alias for priority_high (P0 — must-pass)
    priority_medium: P1 — should-pass
    p1: Alias for priority_medium (P1 — should-pass)
    priority_low: P2 — nice-to-pass
    p2: Alias for priority_low (P2 — nice-to-pass)
    # Automation status
    manual: Requires manual verification
    automated: Fully automatable
